<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Islam AI by Muhammad Salman Nadeem: ask questions about Quran, Hadith, Fiqh, Seerah, and Islamic knowledge."
  />
  <meta
    name="keywords"
    content="Islam AI, Islamic chatbot, Quran questions, Hadith questions, Fiqh assistant, Seerah AI"
  />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <link rel="canonical" href="https://ezoi.me/islamAI/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Islam AI - Muhammad Salman Nadeem" />
  <meta
    property="og:description"
    content="Ask Islamic questions and get guidance powered by an Islamic knowledge API."
  />
  <meta property="og:url" content="https://ezoi.me/islamAI/" />
  <meta property="og:site_name" content="Muhammad Salman Nadeem Portfolio" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Islam AI - Muhammad Salman Nadeem" />
  <meta
    name="twitter:description"
    content="Ask Islamic questions and get guidance powered by an Islamic knowledge API."
  />
  <title>Islam AI - Muhammad Salman Nadeem</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .islamai-page {
      min-height: 100vh;
      padding: 40px 20px;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      background: linear-gradient(90deg, #6f7bff, #20d7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .header p {
      color: var(--muted);
      font-size: 1.05rem;
      margin: 0;
    }

    .chat-shell {
      background: var(--surface-strong);
      border: 1px solid rgba(111, 123, 255, 0.35);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 10px 30px rgba(6, 10, 28, 0.55);
    }

    .chat-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .chat-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      width: 100%;
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 180px;
      flex: 1 1 220px;
    }

    .control label {
      font-size: 0.78rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: #a8bee9;
    }

    .control select {
      border-radius: 10px;
      border: 1px solid rgba(163, 185, 255, 0.55);
      background: rgba(10, 16, 36, 0.86);
      color: var(--text);
      padding: 10px 11px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
    }

    .control select:focus {
      border-color: #20d7ff;
      box-shadow: 0 0 0 2px rgba(32, 215, 255, 0.2);
    }

    .chat-window {
      height: min(65vh, 620px);
      overflow-y: auto;
      background: rgba(7, 12, 30, 0.75);
      border: 1px solid rgba(117, 141, 255, 0.28);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 82%;
      padding: 10px 12px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-wrap: break-word;
      border: 1px solid transparent;
    }

    .msg.user {
      align-self: flex-end;
      background: rgba(111, 123, 255, 0.22);
      border-color: rgba(111, 123, 255, 0.55);
      color: #eef2ff;
    }

    .msg.bot {
      align-self: flex-start;
      background: rgba(32, 215, 255, 0.12);
      border-color: rgba(32, 215, 255, 0.45);
      color: #e9f8ff;
      max-width: 95%;
      width: min(100%, 820px);
    }

    .msg.system {
      align-self: center;
      max-width: 95%;
      background: rgba(255, 193, 7, 0.12);
      border-color: rgba(255, 193, 7, 0.35);
      color: #ffe9a9;
      font-size: 0.88rem;
      text-align: center;
    }

    .typing {
      display: none;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      padding-left: 4px;
    }

    .typing.active {
      display: block;
    }

    .composer {
      margin-top: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .composer textarea {
      width: 100%;
      min-height: 56px;
      max-height: 160px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid rgba(163, 185, 255, 0.55);
      background: rgba(10, 16, 36, 0.86);
      color: var(--text);
      padding: 12px;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
    }

    .composer textarea:focus {
      border-color: #20d7ff;
      box-shadow: 0 0 0 2px rgba(32, 215, 255, 0.2);
    }

    .send-btn {
      align-self: end;
      height: 56px;
      padding: 0 22px;
      border-radius: 12px;
      border: 1px solid rgba(176, 208, 255, 0.75);
      background: linear-gradient(140deg, rgba(89, 115, 255, 0.55), rgba(39, 198, 255, 0.55));
      color: #f4f8ff;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .send-btn:hover {
      transform: translateY(-1px);
      background: linear-gradient(140deg, rgba(98, 126, 255, 0.7), rgba(44, 204, 255, 0.7));
    }

    .send-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .actions {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip-btn {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(163, 185, 255, 0.55);
      background: rgba(255, 255, 255, 0.08);
      color: #e8f0ff;
      font-size: 0.86rem;
      cursor: pointer;
    }

    .chip-btn:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .assistant-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .assistant-body p {
      margin: 0 0 10px;
      line-height: 1.65;
    }

    .assistant-body p:last-child {
      margin-bottom: 0;
    }

    .assistant-actions {
      display: flex;
      justify-content: flex-end;
    }

    .copy-btn {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(180, 225, 255, 0.55);
      background: rgba(255, 255, 255, 0.08);
      color: #dff3ff;
      font-size: 0.78rem;
      cursor: pointer;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .references {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .references-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #9ddaff;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .reference-box {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border-radius: 10px;
      border: 1px solid rgba(117, 199, 255, 0.45);
      background: rgba(23, 42, 68, 0.46);
      padding: 8px 10px;
    }

    .reference-box span {
      font-size: 0.88rem;
      line-height: 1.4;
      color: #e8f7ff;
      word-break: break-word;
    }

    @media (max-width: 700px) {
      .islamai-page { padding: 22px 12px; }
      .composer { grid-template-columns: 1fr; }
      .send-btn { width: 100%; }
      .msg { max-width: 95%; }
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>

  <button class="menu-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="sidebar-menu">☰</button>
  <div class="menu-overlay" hidden></div>

  <aside class="sidebar-menu" id="sidebar-menu" aria-hidden="true">
    <nav class="sidebar-nav" aria-label="Sidebar">
      <a href="/">Home</a>
      <a href="/blogs/">Blogs</a>
      <a href="/pages/">Web Pages</a>
      <a href="/tools/">Tools</a>
    </nav>
  </aside>

  <div class="islamai-page">
    <div class="container">
      <div class="header">
        <h1>🕌 Islam AI</h1>
      </div>

      <section class="chat-shell" aria-label="Islam AI Chatbot">
        <div class="chat-meta">
          <span id="statusText">Status: Ready</span>
          <div class="chat-controls">
            <div class="control">
              <label for="lengthSelect">Response length</label>
              <select id="lengthSelect">
                <option value="short">Short</option>
                <option value="medium" selected>Medium</option>
                <option value="extended">Extended</option>
              </select>
            </div>
            <div class="control">
              <label for="languageSelect">Preferred language</label>
              <select id="languageSelect">
                <option value="english" selected>English</option>
                <option value="urdu">Urdu</option>
                <option value="roman urdu">Roman Urdu</option>
              </select>
            </div>
            <div class="control">
              <label for="resourceSelect">Knowledge resource</label>
              <select id="resourceSelect">
                <option value="full" selected>Full (all resources)</option>
                <option value="quran">Quran Verses — 6,236 — /quran/:key</option>
                <option value="hadith">Hadith (7 collections) — 36,390 — /hadith/:key</option>
                <option value="tafsir">Tafsir Ibn Kathir — ~6,000 — /tafsir/:key</option>
                <option value="rijal">Rijal Narrators — 18,298 — /rijal</option>
                <option value="tawhid">Kitab At-Tawhid — 66 — /tawhid</option>
                <option value="aqidah">Aqidah Salaf — 60 — /aqidah</option>
                <option value="amalan">Amalan Sunnah — 97 — /amalan</option>
                <option value="nawawi">Hadith Nawawi — 42 — /nawawi</option>
                <option value="doa">Doa Harian — 50 — /doa</option>
                <option value="asmaul-husna">Asmaul Husna — 99 — /asmaul-husna</option>
                <option value="figures">Islamic Figures — 26 — /figures</option>
                <option value="maudhu">Hadith Maudhu — 15 — /maudhu</option>
                <option value="mosque">Masjid Salaf — dynamic — /mosque</option>
                <option value="school">Sekolah Salaf — dynamic — /school</option>
                <option value="lecture">Kajian Salaf — dynamic — /lecture</option>
                <option value="lecture-webhook">Lecture Webhook — POST — /lecture/webhook</option>
              </select>
            </div>
          </div>
        </div>

        <div id="chatWindow" class="chat-window" aria-live="polite"></div>
        <div id="typing" class="typing">Islam AI is typing...</div>

        <div class="composer">
          <textarea id="messageInput" placeholder="Ask anything about Islam... (Enter to send, Shift+Enter for new line)"></textarea>
          <button id="sendBtn" class="send-btn" type="button">Send</button>
        </div>

        <div class="actions">
          <button id="clearBtn" class="chip-btn" type="button">Clear Chat</button>
          <a href="/" style="color:#8fdbff; text-decoration: underline; font-size: 0.9rem; align-self:center;">← Back to Main Portfolio</a>
        </div>
      </section>
    </div>
  </div>

  <script>
    // Sidebar menu
    const menuToggle = document.querySelector('.menu-toggle');
    const sidebarMenu = document.getElementById('sidebar-menu');
    const menuOverlay = document.querySelector('.menu-overlay');

    const closeMenu = () => {
      sidebarMenu.classList.remove('is-open');
      menuOverlay.hidden = true;
      menuToggle.setAttribute('aria-expanded', 'false');
      sidebarMenu.setAttribute('aria-hidden', 'true');
    };

    const openMenu = () => {
      sidebarMenu.classList.add('is-open');
      menuOverlay.hidden = false;
      menuToggle.setAttribute('aria-expanded', 'true');
      sidebarMenu.setAttribute('aria-hidden', 'false');
    };

    menuToggle.addEventListener('click', () => {
      sidebarMenu.classList.contains('is-open') ? closeMenu() : openMenu();
    });

    menuOverlay.addEventListener('click', closeMenu);
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && sidebarMenu.classList.contains('is-open')) closeMenu();
    });

    // Chatbot logic
    const API_BASE = 'https://sunnah.amanahagent.cloud/api/v1';
    const API_KEY = window.ISLAM_AI_API_KEY || '';

    const chatWindow = document.getElementById('chatWindow');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const typingEl = document.getElementById('typing');
    const statusText = document.getElementById('statusText');
    const lengthSelect = document.getElementById('lengthSelect');
    const languageSelect = document.getElementById('languageSelect');
    const resourceSelect = document.getElementById('resourceSelect');

    let isSending = false;
    let chatHistory = [];

    const WELCOME = 'Assalamu Alaikum! I am Islam AI. Ask me about Quran, Hadith, Fiqh, Seerah, duas, and Islamic knowledge.';

    const RESOURCE_HINTS = {
      full: 'all available Islamic resources',
      quran: 'Quran verses collection (/quran/:key)',
      hadith: 'Hadith collections (/hadith/:key)',
      tafsir: 'Tafsir Ibn Kathir (/tafsir/:key)',
      rijal: 'Rijal Narrators (/rijal)',
      tawhid: 'Kitab At-Tawhid (/tawhid)',
      aqidah: 'Aqidah Salaf (/aqidah)',
      amalan: 'Amalan Sunnah (/amalan)',
      nawawi: 'Hadith Nawawi (/nawawi)',
      doa: 'Doa Harian (/doa)',
      'asmaul-husna': 'Asmaul Husna (/asmaul-husna)',
      figures: 'Islamic Figures (/figures)',
      maudhu: 'Hadith Maudhu (/maudhu)',
      mosque: 'Masjid Salaf directory (/mosque)',
      school: 'Sekolah Salaf directory (/school)',
      lecture: 'Kajian Salaf (/lecture)',
      'lecture-webhook': 'lecture webhook details (/lecture/webhook)'
    };

    function copyText(text) {
      if (!text) return;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(() => {});
        return;
      }
      const area = document.createElement('textarea');
      area.value = text;
      area.setAttribute('readonly', '');
      area.style.position = 'absolute';
      area.style.left = '-9999px';
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      area.remove();
    }

    function extractReferences(text) {
      if (!text) return { body: '', refs: [] };

      const normalized = String(text).replace(/\r\n/g, '\n').trim();
      const split = normalized.split(/\n+(?:\*\*)?(?:references|sources|refs?)(?:\*\*)?\s*:?\n+/i);
      if (split.length > 1) {
        const body = split[0].trim();
        const refLines = split.slice(1).join('\n').split('\n').map((line) => line.replace(/^[\-\*\d\.\)\s]+/, '').trim()).filter(Boolean);
        return { body, refs: refLines };
      }
      return { body: normalized, refs: [] };
    }

    function renderAssistantMessage(wrapper, text) {
      const { body, refs } = extractReferences(text);
      const card = document.createElement('div');
      card.className = 'assistant-card';

      const bodyEl = document.createElement('div');
      bodyEl.className = 'assistant-body';
      body.split(/\n{2,}/).filter(Boolean).forEach((paragraph) => {
        const p = document.createElement('p');
        p.textContent = paragraph.trim();
        bodyEl.appendChild(p);
      });
      card.appendChild(bodyEl);

      if (refs.length) {
        const refsWrap = document.createElement('div');
        refsWrap.className = 'references';
        const title = document.createElement('div');
        title.className = 'references-title';
        title.textContent = 'References';
        refsWrap.appendChild(title);

        refs.forEach((refText) => {
          const box = document.createElement('div');
          box.className = 'reference-box';
          const span = document.createElement('span');
          span.textContent = refText;
          const copyBtn = document.createElement('button');
          copyBtn.className = 'copy-btn';
          copyBtn.type = 'button';
          copyBtn.textContent = 'Copy';
          copyBtn.addEventListener('click', () => copyText(refText));
          box.appendChild(span);
          box.appendChild(copyBtn);
          refsWrap.appendChild(box);
        });

        card.appendChild(refsWrap);
      }

      const actions = document.createElement('div');
      actions.className = 'assistant-actions';
      const copyAllBtn = document.createElement('button');
      copyAllBtn.className = 'copy-btn';
      copyAllBtn.type = 'button';
      copyAllBtn.textContent = 'Copy answer';
      copyAllBtn.addEventListener('click', () => copyText(text));
      actions.appendChild(copyAllBtn);
      card.appendChild(actions);

      wrapper.appendChild(card);
    }

    function addMessage(role, text) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;
      if (role === 'bot') {
        renderAssistantMessage(div, text);
      } else {
        div.textContent = text;
      }
      chatWindow.appendChild(div);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function setTyping(active) {
      typingEl.classList.toggle('active', active);
    }

    function setSendingState(sending) {
      isSending = sending;
      sendBtn.disabled = sending;
      messageInput.disabled = sending;
      lengthSelect.disabled = sending;
      languageSelect.disabled = sending;
      resourceSelect.disabled = sending;
      statusText.textContent = sending ? 'Status: Thinking…' : 'Status: Ready';
      setTyping(sending);
    }

    function normalizeResponse(data) {
      if (!data) return '';

      if (typeof data === 'string') return data;

      if (Array.isArray(data)) {
        for (const item of data) {
          const maybe = normalizeResponse(item);
          if (maybe) return maybe;
        }
      }

      return (
        data.answer ||
        data.response ||
        data.reply ||
        data.message ||
        data.output ||
        data.result ||
        (data.data ? normalizeResponse(data.data) : '') ||
        (data.choices && data.choices[0] && (data.choices[0].message?.content || data.choices[0].text)) ||
        ''
      );
    }

    async function queryIslamAI(userText) {
      const responseLength = lengthSelect.value || 'medium';
      const preferredLanguage = languageSelect.value || 'english';
      const selectedResource = resourceSelect.value || 'full';
      const selectedResourceHint = RESOURCE_HINTS[selectedResource] || RESOURCE_HINTS.full;

      const styleInstruction = [
        `Respond in ${preferredLanguage}.`,
        `Keep the answer ${responseLength}.`,
        'Write in a smooth, polished, natural tone similar to top conversational assistants.',
        `Use ${selectedResourceHint} only unless the user asks to broaden scope.`,
        'If citing evidence, add a "References:" section at the end and list each reference on a new line.'
      ].join(' ');

      const payload = {
        message: `${userText}\n\nStyle instructions: ${styleInstruction}`,
        history: chatHistory,
        response_length: responseLength,
        preferred_language: preferredLanguage,
        resource_scope: selectedResource
      };

      const candidatePaths = [
        '/islamAI/chat',
        '/islamAI',
        '/chat',
        '/ask'
      ];

      let lastError = null;

      for (const path of candidatePaths) {
        try {
          const headers = {
            'Content-Type': 'application/json'
          };

          if (API_KEY) {
            headers.Authorization = 'Bearer ' + API_KEY;
            headers['x-api-key'] = API_KEY;
          }

          const res = await fetch(API_BASE + path, {
            method: 'POST',
            headers,
            body: JSON.stringify(payload)
          });

          if (!res.ok) {
            const txt = await res.text().catch(() => '');
            throw new Error(`HTTP ${res.status} on ${path}${txt ? `: ${txt.slice(0, 180)}` : ''}`);
          }

          const textBody = await res.text();
          let answer = textBody;

          if (textBody) {
            try {
              const json = JSON.parse(textBody);
              answer = normalizeResponse(json) || textBody;
            } catch {
              answer = textBody;
            }
          }

          if (!answer) {
            throw new Error(`No readable answer field returned from ${path}`);
          }

          return answer;
        } catch (err) {
          lastError = err;
        }
      }

      throw lastError || new Error('Unable to reach Islam AI endpoint.');
    }

    async function handleSend() {
      const text = messageInput.value.trim();
      if (!text || isSending) return;

      addMessage('user', text);
      chatHistory.push({ role: 'user', content: text });
      messageInput.value = '';

      setSendingState(true);

      try {
        const answer = await queryIslamAI(text);
        addMessage('bot', answer);
        chatHistory.push({ role: 'assistant', content: answer });
      } catch (err) {
        console.error(err);
        const errMsg = 'Sorry, I could not fetch a response right now. Please try again in a moment.';
        addMessage('system', errMsg);
      } finally {
        setSendingState(false);
        messageInput.focus();
      }
    }

    sendBtn.addEventListener('click', handleSend);

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    clearBtn.addEventListener('click', () => {
      chatWindow.innerHTML = '';
      chatHistory = [];
      addMessage('bot', WELCOME);
      messageInput.focus();
    });

    // Init
    addMessage('bot', WELCOME);
    messageInput.focus();
  </script>
</body>
</html>
