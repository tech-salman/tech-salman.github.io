<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Blogs by Muhammad Salman Nadeem with technical articles, tutorials, and productivity tricks." />
  <meta name="keywords" content="Muhammad Salman Nadeem blogs, tech articles, web development tutorials, productivity tricks" />
  <meta name="robots" content="index, follow, max-image-preview:large" />
  <link rel="canonical" href="https://ezoi.me/blogs/" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Blogs - Muhammad Salman Nadeem" />
  <meta property="og:description" content="Blogs by Muhammad Salman Nadeem with technical articles, tutorials, and productivity tricks." />
  <meta property="og:url" content="https://ezoi.me/blogs/" />
  <meta property="og:site_name" content="Muhammad Salman Nadeem Portfolio" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Blogs - Muhammad Salman Nadeem" />
  <meta name="twitter:description" content="Blogs by Muhammad Salman Nadeem with technical articles, tutorials, and productivity tricks." />
  <title>Blogs - Muhammad Salman Nadeem</title>
  <link rel="stylesheet" href="../styles.css" />
  <style>
    .blogs-page { 
      min-height: 100vh; 
      padding: 40px 20px; 
      background: var(--bg); 
      color: var(--text); 
    }
    .container { 
      max-width: 1100px; 
      margin: 0 auto; 
    }
    .header { 
      text-align: center; 
      margin-bottom: 60px; 
    }
    .header h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      background: linear-gradient(90deg, #6f7bff, #20d7ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .blogs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }
    .blog-card {
      background: var(--surface-strong);
      border: 1px solid rgba(111, 123, 255, 0.3);
      border-radius: 16px;
      padding: 40px 24px;
      text-align: center;
      transition: all 0.4s ease;
    }
    .blog-card:hover {
      transform: translateY(-12px) scale(1.03);
      border-color: #20d7ff;
    }
    .blog-icon {
      font-size: 3.5rem;
      margin-bottom: 16px;
    }
    .blog-name { 
      font-size: 1.8rem; 
      font-weight: 700; 
      margin: 16px 0 12px; 
    }
    .blog-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 36px;
      background: linear-gradient(140deg, #6f7bff, #20d7ff);
      color: white;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 6px 20px rgba(111, 123, 255, 0.4);
      transition: all 0.3s ease;
    }
    .blog-btn:hover { 
      transform: scale(1.08); 
      box-shadow: 0 12px 30px rgba(32, 215, 255, 0.5); 
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  
  <button class="menu-toggle" type="button" aria-label="Open navigation menu">☰</button>
  <div class="menu-overlay" hidden></div>
  
  <aside class="sidebar-menu" id="sidebar-menu" aria-hidden="true">
    <nav class="sidebar-nav" aria-label="Sidebar">
      <a href="/">Home</a>
      <a href="/pages/">Web Pages</a>
      <a href="/tools/">Tools</a>
      <a href="/islamAI/">Islam AI</a>
    </nav>
  </aside>

  <div class="blogs-page">
    <div class="container">
      <div class="header">
        <h1>📝 My Blogs</h1>
        <p style="color: var(--muted); font-size: 1.1rem;">Thoughts, Articles & Tech Tricks</p>
      </div>

      <div class="blogs-grid">
        <div class="blog-card">
          <div class="blog-icon">✍️</div>
          <h2 class="blog-name">Articles</h2>
          <p style="color: var(--muted);">In-depth writings and tutorials</p>
          <a href="/blogs/articles/" class="blog-btn">Explore Articles →</a>
        </div>

        <div class="blog-card">
          <div class="blog-icon">🛠️</div>
          <h2 class="blog-name">Tricks</h2>
          <p style="color: var(--muted);">Quick tips, hacks & productivity tricks</p>
          <a href="/blogs/tricks/" class="blog-btn">Explore Tricks →</a>
        </div>
      </div>

      <div style="text-align: center; margin-top: 60px;">
        <a href="/" style="color: #8fdbff; text-decoration: underline;">← Back to Main Portfolio</a>
      </div>
    </div>
  </div>

  <script>
    const menuToggle = document.querySelector(".menu-toggle");
    const sidebarMenu = document.getElementById("sidebar-menu");
    const menuOverlay = document.querySelector(".menu-overlay");

    const closeMenu = () => {
      sidebarMenu.classList.remove("is-open");
      menuOverlay.hidden = true;
      menuToggle.setAttribute("aria-expanded", "false");
      sidebarMenu.setAttribute("aria-hidden", "true");
    };

    const openMenu = () => {
      sidebarMenu.classList.add("is-open");
      menuOverlay.hidden = false;
      menuToggle.setAttribute("aria-expanded", "true");
      sidebarMenu.setAttribute("aria-hidden", "false");
    };

    menuToggle.addEventListener("click", () => {
      sidebarMenu.classList.contains("is-open") ? closeMenu() : openMenu();
    });

    menuOverlay.addEventListener("click", closeMenu);
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && sidebarMenu.classList.contains("is-open")) closeMenu();
    });
  </script>
</body>
</html>
