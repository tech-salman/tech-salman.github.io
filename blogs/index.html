<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blogs - Muhammad Salman Nadeem</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .coming-soon {
      text-align: center;
      padding: 100px 20px;
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }
    .coming-soon h1 {
      font-size: clamp(2rem, 6vw, 2.8rem);
      color: #6f7bff;
    }
    .back-home-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(140deg, #6f7bff, #20d7ff);
      border: none;
      border-radius: 50px;
      text-decoration: none;
      box-shadow: 0 8px 25px rgba(111, 123, 255, 0.4);
      transition: all 0.3s ease;
    }
    .back-home-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 35px rgba(111, 123, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  
  <button class="menu-toggle" type="button" aria-label="Open navigation menu">☰</button>
  <div class="menu-overlay" hidden></div>
  
  <aside class="sidebar-menu" id="sidebar-menu" aria-hidden="true">
    <nav class="sidebar-nav" aria-label="Sidebar">
      <a href="/">Home</a>
      <a href="/pages/">Pages</a>
    </nav>
  </aside>

  <div class="coming-soon">
    <h1>📝 Blogs</h1>
    <p><strong>Blogs are getting ready and will be uploaded soon!</strong></p>
    <a href="/" class="back-home-btn">← Return to ezoi.me</a>
  </div>

  <script>
    const menuToggle = document.querySelector(".menu-toggle");
    const sidebarMenu = document.getElementById("sidebar-menu");
    const menuOverlay = document.querySelector(".menu-overlay");

    const closeMenu = () => {
      sidebarMenu.classList.remove("is-open");
      menuOverlay.hidden = true;
      menuToggle.setAttribute("aria-expanded", "false");
      sidebarMenu.setAttribute("aria-hidden", "true");
    };

    const openMenu = () => {
      sidebarMenu.classList.add("is-open");
      menuOverlay.hidden = false;
      menuToggle.setAttribute("aria-expanded", "true");
      sidebarMenu.setAttribute("aria-hidden", "false");
    };

    menuToggle.addEventListener("click", () => {
      sidebarMenu.classList.contains("is-open") ? closeMenu() : openMenu();
    });

    menuOverlay.addEventListener("click", closeMenu);
    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && sidebarMenu.classList.contains("is-open")) closeMenu();
    });
  </script>
</body>
</html>
