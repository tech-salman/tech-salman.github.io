<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visitors - Muhammad Salman Nadeem</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .visitors-page { min-height: 100vh; padding: 40px 20px; background: var(--bg); color: var(--text); }
    .visitor-list {
      max-width: 700px;
      margin: 40px auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .visitor-item {
      background: var(--surface);
      padding: 18px 26px;
      border-radius: 12px;
      border-left: 5px solid #20d7ff;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  
  <button class="menu-toggle" type="button" aria-label="Open navigation menu">☰</button>
  <div class="menu-overlay" hidden></div>
  
  <aside class="sidebar-menu" id="sidebar-menu" aria-hidden="true">
    <nav class="sidebar-nav" aria-label="Sidebar">
      <a href="/">Home</a>
      <a href="/pages/">My Domains</a>
      <a href="/blogs/">Blogs</a>
      <a href="/visitors/">Visitors</a>
    </nav>
  </aside>

  <div class="visitors-page">
    <div style="text-align:center; max-width:800px; margin:0 auto;">
      <h1>✦ Visitors List ✦</h1>
      <p style="color: var(--muted);">Thank you for visiting!</p>
      <div id="visitor-list" class="visitor-list">Loading visitors...</div>
    </div>
  </div>

  <script>
    fetch('https://script.google.com/macros/s/AKfycbxG9vwkjZ_Rc8ZpBp2nYdh3i6WCuNs8Ix7LcaM6eHfH-QX4T-vEt1QtsHRMTE9Ly4aA/exec')
      .then(r => r.json())
      .then(data => {
        const container = document.getElementById('visitor-list');
        if (!data.visitors || data.visitors.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:#a8b6df;">No visitors yet. Be the first one!</p>';
        } else {
          container.innerHTML = '';
          data.visitors.forEach(v => {
            const div = document.createElement('div');
            div.className = 'visitor-item';
            div.innerHTML = `
              <strong>${v.name}</strong>
              <span style="color: var(--muted); font-size: 0.9rem;">${v.date}</span>
            `;
            container.appendChild(div);
          });
        }
      })
      .catch(() => {
        document.getElementById('visitor-list').innerHTML = 
          '<p style="text-align:center;color:#a8b6df;">Unable to load visitors at the moment.</p>';
      });
  </script>
</body>
</html>
